databaseChangeLog:
  - changeSet:
      id: 163-platform-role-approval-permissions
      author: codex
      comment: 平台角色审批权限码 + 绑定 ROLE_PLATFORM_ADMIN + api_endpoint requirement
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        and:
          - tableExists:
              tableName: permission
          - tableExists:
              tableName: role
          - tableExists:
              tableName: role_permission
          - tableExists:
              tableName: api_endpoint
          - tableExists:
              tableName: api_endpoint_permission_requirement
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            stripComments: false
            sql: |
              INSERT INTO `permission` (
                `permission_code`,
                `permission_name`,
                `module_code`,
                `action_code`,
                `permission_type`,
                `description`,
                `enabled`,
                `built_in_flag`,
                `tenant_id`,
                `created_by`,
                `created_at`,
                `updated_by`,
                `updated_at`
              )
              SELECT src.`permission_code`, src.`permission_name`, src.`module_code`, src.`action_code`,
                     src.`permission_type`, src.`description`, src.`enabled`, src.`built_in_flag`,
                     NULL, NULL, NOW(), NULL, NOW()
              FROM (
                SELECT 'platform:role:approval:list' AS `permission_code`, '平台角色审批列表' AS `permission_name`, 'platform' AS `module_code`, 'list' AS `action_code`, 'OTHER' AS `permission_type`, '平台角色赋权审批查询' AS `description`, 1 AS `enabled`, 1 AS `built_in_flag`
                UNION ALL SELECT 'platform:role:approval:submit', '平台角色审批提交', 'platform', 'submit', 'OTHER', '提交平台角色赋权审批', 1, 1
                UNION ALL SELECT 'platform:role:approval:approve', '平台角色审批通过', 'platform', 'approve', 'OTHER', '审批通过平台角色赋权', 1, 1
                UNION ALL SELECT 'platform:role:approval:reject', '平台角色审批拒绝', 'platform', 'reject', 'OTHER', '拒绝平台角色赋权审批', 1, 1
                UNION ALL SELECT 'platform:role:approval:cancel', '平台角色审批撤销', 'platform', 'cancel', 'OTHER', '撤销待审批申请', 1, 1
              ) src
              WHERE NOT EXISTS (
                SELECT 1 FROM `permission` p
                WHERE p.`tenant_id` IS NULL AND p.`permission_code` = src.`permission_code`
              );

              INSERT IGNORE INTO `role_permission` (`role_id`, `permission_id`, `tenant_id`, `created_by`, `created_at`)
              SELECT r.`id`, p.`id`, NULL, NULL, NOW()
              FROM `role` r
              JOIN `permission` p ON p.`tenant_id` IS NULL
                AND p.`permission_code` IN (
                  'platform:role:approval:list',
                  'platform:role:approval:submit',
                  'platform:role:approval:approve',
                  'platform:role:approval:reject',
                  'platform:role:approval:cancel'
                )
              WHERE r.`tenant_id` IS NULL
                AND r.`code` = 'ROLE_PLATFORM_ADMIN';

              INSERT IGNORE INTO `api_endpoint` (
                `tenant_id`,
                `resource_level`,
                `name`,
                `title`,
                `uri`,
                `method`,
                `permission`,
                `required_permission_id`,
                `enabled`,
                `created_at`,
                `updated_at`
              )
              SELECT NULL, 'PLATFORM', x.name, x.title, x.uri, x.method, x.permission_code, p.`id`, 1, NOW(), NOW()
              FROM (
                SELECT 'platform-role-assignment-requests-get' AS name, '平台角色赋权审批列表' AS title, '/platform/role-assignment-requests' AS uri, 'GET' AS method, 'platform:role:approval:list' AS permission_code
                UNION ALL SELECT 'platform-role-assignment-requests-post', '平台角色赋权审批提交', '/platform/role-assignment-requests', 'POST', 'platform:role:approval:submit'
                UNION ALL SELECT 'platform-role-assignment-requests-approve', '平台角色赋权审批通过', '/platform/role-assignment-requests/{id}/approve', 'POST', 'platform:role:approval:approve'
                UNION ALL SELECT 'platform-role-assignment-requests-reject', '平台角色赋权审批拒绝', '/platform/role-assignment-requests/{id}/reject', 'POST', 'platform:role:approval:reject'
                UNION ALL SELECT 'platform-role-assignment-requests-cancel', '平台角色赋权审批撤销', '/platform/role-assignment-requests/{id}/cancel', 'POST', 'platform:role:approval:cancel'
              ) x
              JOIN `permission` p ON p.`tenant_id` IS NULL AND p.`permission_code` = x.permission_code
              WHERE NOT EXISTS (
                SELECT 1 FROM `api_endpoint` e
                WHERE e.`tenant_id` IS NULL AND e.`uri` = x.uri AND e.`method` = x.method
              );

              INSERT IGNORE INTO `api_endpoint_permission_requirement` (
                `tenant_id`,
                `api_endpoint_id`,
                `requirement_group`,
                `sort_order`,
                `permission_id`,
                `negated`,
                `created_at`,
                `updated_at`
              )
              SELECT
                e.`tenant_id`,
                e.`id`,
                0,
                1,
                e.`required_permission_id`,
                0,
                NOW(),
                NOW()
              FROM `api_endpoint` e
              WHERE e.`tenant_id` IS NULL
                AND e.`uri` IN (
                  '/platform/role-assignment-requests',
                  '/platform/role-assignment-requests/{id}/approve',
                  '/platform/role-assignment-requests/{id}/reject',
                  '/platform/role-assignment-requests/{id}/cancel'
                )
                AND e.`required_permission_id` IS NOT NULL;
