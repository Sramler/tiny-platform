                SELECT tenant_id, name, MIN(id) AS keep_id
                FROM `role`
                GROUP BY tenant_id, name
              ) k ON k.tenant_id = (SELECT r.tenant_id FROM `role` r WHERE r.id = rr.role_id)
                 AND k.name = (SELECT r.name FROM `role` r WHERE r.id = rr.role_id)
              SET rr.role_id = k.keep_id
              WHERE rr.role_id <> k.keep_id;
              DELETE r1 FROM `role` r1
              JOIN `role` r2
                ON r1.tenant_id = r2.tenant_id AND r1.name = r2.name AND r1.id > r2.id;

