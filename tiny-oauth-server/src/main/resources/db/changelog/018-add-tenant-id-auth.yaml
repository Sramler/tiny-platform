databaseChangeLog:
  - changeSet:
      id: add-tenant-id-auth-tables
      author: tiny
      comment: auth 用户/角色/资源加入 tenant_id 及租户级唯一约束
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            stripComments: false
            sql: |
              SET @sql := (
                SELECT IF(
                  EXISTS(SELECT 1 FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'user' AND COLUMN_NAME = 'tenant_id'),
                  'SELECT 1',
                  'ALTER TABLE `user` ADD COLUMN `tenant_id` BIGINT NULL COMMENT ''租户ID'''
                )
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
              UPDATE `user` SET tenant_id = 1 WHERE tenant_id IS NULL;
              ALTER TABLE `user` MODIFY COLUMN `tenant_id` BIGINT NOT NULL COMMENT '租户ID';
              SET @sql := (
                SELECT IF(
                  EXISTS(SELECT 1 FROM INFORMATION_SCHEMA.STATISTICS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'user' AND INDEX_NAME = 'uk_user_username'),
