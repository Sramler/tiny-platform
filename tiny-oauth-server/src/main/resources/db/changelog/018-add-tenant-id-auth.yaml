                  'SELECT 1'
                )
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;
              -- 去重：按 (tenant_id, code)
              UPDATE `user_role` ur
              JOIN (
                SELECT tenant_id, code, MIN(id) AS keep_id
                FROM `role`
                GROUP BY tenant_id, code
              ) k ON k.tenant_id = (SELECT r.tenant_id FROM `role` r WHERE r.id = ur.role_id)
                 AND k.code = (SELECT r.code FROM `role` r WHERE r.id = ur.role_id)
              SET ur.role_id = k.keep_id
              WHERE ur.role_id <> k.keep_id;
              UPDATE `role_resource` rr
              JOIN (
                SELECT tenant_id, code, MIN(id) AS keep_id
                FROM `role`
                GROUP BY tenant_id, code
              ) k ON k.tenant_id = (SELECT r.tenant_id FROM `role` r WHERE r.id = rr.role_id)
                 AND k.code = (SELECT r.code FROM `role` r WHERE r.id = rr.role_id)
              SET rr.role_id = k.keep_id
              WHERE rr.role_id <> k.keep_id;
              DELETE r1 FROM `role` r1
              JOIN `role` r2
                ON r1.tenant_id = r2.tenant_id AND r1.code = r2.code AND r1.id > r2.id;
              -- 去重：按 (tenant_id, name)
              UPDATE `user_role` ur
              JOIN (
                SELECT tenant_id, name, MIN(id) AS keep_id
                FROM `role`
                GROUP BY tenant_id, name
              ) k ON k.tenant_id = (SELECT r.tenant_id FROM `role` r WHERE r.id = ur.role_id)
                 AND k.name = (SELECT r.name FROM `role` r WHERE r.id = ur.role_id)
              SET ur.role_id = k.keep_id
