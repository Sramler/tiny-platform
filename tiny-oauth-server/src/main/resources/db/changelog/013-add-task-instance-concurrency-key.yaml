databaseChangeLog:
  - changeSet:
      id: add-scheduling-task-instance-concurrency-key
      author: tiny
      comment: scheduling_task_instance 增加 concurrency_key 列，用于 KEYED 并发策略
      changes:
        - addColumn:
            tableName: scheduling_task_instance
            columns:
              - column:
                  name: concurrency_key
                  type: VARCHAR(128)
                  remarks: KEYED 并发键，parallelGroup 优先否则 nodeCode 否则 TASK-<taskId>
  - changeSet:
      id: add-scheduling-task-instance-concurrency-index
      author: tiny
      comment: scheduling_task_instance 增加 (task_id, concurrency_key, status) 索引，用于 KEYED 并发查询
      changes:
        - createIndex:
            indexName: idx_scheduling_task_instance_task_concurrency_status
            tableName: scheduling_task_instance
            columns:
              - column:
                  name: task_id
              - column:
                  name: concurrency_key
              - column:
                  name: status
