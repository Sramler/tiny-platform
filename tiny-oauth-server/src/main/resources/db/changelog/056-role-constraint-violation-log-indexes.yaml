databaseChangeLog:
  - changeSet:
      id: 056-role-constraint-violation-log-indexes
      author: tiny
      comment: "RBAC3 violation log: add composite indexes for query"
      validCheckSum:
        - ANY
      preConditions:
        - onFail: CONTINUE
        - onError: HALT
        - dbms:
            type: mysql
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            stripComments: false
            endDelimiter: ;
            sql: |
              -- tenant + violation_type + created_at is a common query pattern for control-plane observability.
              SET @sql := (
                SELECT IF(
                  EXISTS(SELECT 1 FROM INFORMATION_SCHEMA.STATISTICS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'role_constraint_violation_log' AND INDEX_NAME = 'idx_role_constraint_violation_log_tenant_type_created'),
                  'SELECT 1',
                  'CREATE INDEX `idx_role_constraint_violation_log_tenant_type_created` ON `role_constraint_violation_log` (`tenant_id`, `violation_type`, `created_at`)'
                )
              );
              PREPARE stmt FROM @sql;
              EXECUTE stmt;
              DEALLOCATE PREPARE stmt;

