databaseChangeLog:
  - changeSet:
      id: 161-align-platform-role-lookup-and-rbac3-menu-requirements
      author: codex
      comment: 对齐平台角色候选 lookup 与平台 RBAC3 菜单 requirement，避免隐藏跨域权限依赖
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        and:
          - tableExists:
              tableName: permission
          - tableExists:
              tableName: api_endpoint
          - tableExists:
              tableName: api_endpoint_permission_requirement
          - tableExists:
              tableName: menu
          - tableExists:
              tableName: menu_permission_requirement
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            stripComments: false
            sql: |
              DELETE requirement
              FROM `api_endpoint_permission_requirement` requirement
              JOIN `api_endpoint` endpoint_entity
                ON endpoint_entity.`id` = requirement.`api_endpoint_id`
              WHERE endpoint_entity.`tenant_id` IS NULL
                AND endpoint_entity.`uri` = '/platform/roles/options'
                AND endpoint_entity.`method` = 'GET';

              INSERT INTO `api_endpoint_permission_requirement` (
                `tenant_id`,
                `api_endpoint_id`,
                `requirement_group`,
                `sort_order`,
                `permission_id`,
                `negated`,
                `created_at`,
                `updated_at`
              )
              SELECT
                endpoint_entity.`tenant_id`,
                endpoint_entity.`id`,
                0,
                1,
                endpoint_entity.`required_permission_id`,
                0,
                NOW(),
                NOW()
              FROM `api_endpoint` endpoint_entity
              WHERE endpoint_entity.`tenant_id` IS NULL
                AND endpoint_entity.`uri` = '/platform/roles/options'
                AND endpoint_entity.`method` = 'GET'
                AND endpoint_entity.`required_permission_id` IS NOT NULL;

              INSERT INTO `api_endpoint_permission_requirement` (
                `tenant_id`,
                `api_endpoint_id`,
                `requirement_group`,
                `sort_order`,
                `permission_id`,
                `negated`,
                `created_at`,
                `updated_at`
              )
              SELECT
                endpoint_entity.`tenant_id`,
                endpoint_entity.`id`,
                permission_map.`requirement_group`,
                1,
                permission_entity.`id`,
                0,
                NOW(),
                NOW()
              FROM `api_endpoint` endpoint_entity
              JOIN (
                SELECT 1 AS `requirement_group`, 'platform:user:edit' AS `permission_code`
                UNION ALL
                SELECT 2 AS `requirement_group`, 'system:role:constraint:view' AS `permission_code`
                UNION ALL
                SELECT 3 AS `requirement_group`, 'system:role:constraint:edit' AS `permission_code`
              ) permission_map
              JOIN `permission` permission_entity
                ON permission_entity.`tenant_id` IS NULL
               AND permission_entity.`permission_code` = permission_map.`permission_code`
              WHERE endpoint_entity.`tenant_id` IS NULL
                AND endpoint_entity.`uri` = '/platform/roles/options'
                AND endpoint_entity.`method` = 'GET';

              DELETE requirement
              FROM `menu_permission_requirement` requirement
              JOIN `menu` menu_entity
                ON menu_entity.`id` = requirement.`menu_id`
              WHERE menu_entity.`tenant_id` IS NULL
                AND menu_entity.`path` = '/platform/role-constraints';

              INSERT INTO `menu_permission_requirement` (
                `tenant_id`,
                `menu_id`,
                `requirement_group`,
                `sort_order`,
                `permission_id`,
                `negated`,
                `created_at`,
                `created_by`,
                `updated_at`,
                `updated_by`
              )
              SELECT
                NULL,
                menu_entity.`id`,
                permission_map.`requirement_group`,
                1,
                permission_entity.`id`,
                0,
                NOW(),
                NULL,
                NOW(),
                NULL
              FROM `menu` menu_entity
              JOIN (
                SELECT 0 AS `requirement_group`, 'system:role:constraint:view' AS `permission_code`
                UNION ALL
                SELECT 1 AS `requirement_group`, 'system:role:constraint:edit' AS `permission_code`
                UNION ALL
                SELECT 2 AS `requirement_group`, 'system:role:constraint:violation:view' AS `permission_code`
              ) permission_map
              JOIN `permission` permission_entity
                ON permission_entity.`tenant_id` IS NULL
               AND permission_entity.`permission_code` = permission_map.`permission_code`
              WHERE menu_entity.`tenant_id` IS NULL
                AND menu_entity.`path` = '/platform/role-constraints';
