databaseChangeLog:
  - changeSet:
      id: 048-tenant-lifecycle-status
      author: tiny
      comment: 为 tenant 表增加 lifecycle_status 字段，用于区分 ACTIVE/FROZEN/DECOMMISSIONED 等生命周期状态
      preConditions:
        - onFail: CONTINUE
        - onError: HALT
        - dbms:
            type: mysql
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            stripComments: false
            sql: |
              ALTER TABLE `tenant`
              ADD COLUMN `lifecycle_status` VARCHAR(16) NOT NULL DEFAULT 'ACTIVE' COMMENT '租户生命周期状态：ACTIVE/FROZEN/DECOMMISSIONED';

