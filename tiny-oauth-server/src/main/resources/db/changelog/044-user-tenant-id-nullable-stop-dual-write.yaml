databaseChangeLog:
  # 停双写：user.tenant_id 改为可空并去掉租户级唯一约束，授权与可见性以 tenant_user 为准。
  # 见 docs/TINY_PLATFORM_AUTHORIZATION_LEGACY_REMOVAL_PLAN.md §3.2
  - changeSet:
      id: 044-user-tenant-id-nullable-stop-dual-write
      author: tiny
      comment: user.tenant_id 可空并删除 uk_user_tenant_username；仅保留展示/审计用途，授权以 tenant_user 为准
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - dbms:
            type: mysql
        - tableExists:
            tableName: user
      changes:
        - dropUniqueConstraint:
            tableName: user
            constraintName: uk_user_tenant_username
        - sql:
            dbms: mysql
            splitStatements: false
            stripComments: false
            sql: |
              ALTER TABLE `user` MODIFY COLUMN `tenant_id` BIGINT NULL COMMENT '租户ID（兼容/展示用，授权以 tenant_user 为准）';
