databaseChangeLog:
  - changeSet:
      id: add-scheduling-dag-cron-expression
      author: tiny
      comment: scheduling_dag 表增加 cron_expression 列，用于持久化 Cron 配置并支持重启恢复
      changes:
        - addColumn:
            tableName: scheduling_dag
            columns:
              - column:
                  name: cron_expression
                  type: VARCHAR(120)
                  remarks: Cron 表达式，用于定时触发 DAG（与 Quartz 同步，重启时从本表恢复）
  - changeSet:
      id: add-scheduling-dag-cron-timezone-enabled
      author: tiny
      comment: scheduling_dag 表增加 cron_timezone、cron_enabled 列，与 schema 一致
      changes:
        - addColumn:
            tableName: scheduling_dag
            columns:
              - column:
                  name: cron_timezone
                  type: VARCHAR(64)
                  remarks: Cron 时区（如 Asia/Shanghai），为空则使用系统默认时区
              - column:
                  name: cron_enabled
                  type: TINYINT(1)
                  defaultValueNumeric: 1
                  remarks: 是否启用 Cron 调度（1=启用，0=禁用），与 enabled 独立控制
  - changeSet:
      id: add-scheduling-dag-cron-enabled-index
      author: tiny
      comment: scheduling_dag 表增加 cron_enabled 索引，与 schema.sql 一致
      changes:
        - createIndex:
            indexName: idx_scheduling_dag_cron_enabled
            tableName: scheduling_dag
            columns:
              - column:
                  name: cron_enabled
