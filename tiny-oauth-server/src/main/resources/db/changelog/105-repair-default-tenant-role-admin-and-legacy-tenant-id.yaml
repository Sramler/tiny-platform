databaseChangeLog:
  - changeSet:
      id: 105-repair-default-tenant-role-admin-and-legacy-tenant-id
      author: tiny
      comment: 修复默认租户 ROLE_TENANT_ADMIN 资源回填，清理孤儿 user.tenant_id，并对齐认证方法 tenant_id
      changes:
        - sql:
            sql: |
              INSERT IGNORE INTO `role_resource` (`tenant_id`, `role_id`, `resource_id`)
              SELECT
                1,
                role_entity.id,
                resource_entity.id
              FROM `role` role_entity
              JOIN `resource` resource_entity
                ON resource_entity.`tenant_id` = 1
              WHERE role_entity.`tenant_id` = 1
                AND role_entity.`code` = 'ROLE_ADMIN';

              UPDATE `user` user_entity
              LEFT JOIN `tenant_user` tenant_membership
                ON tenant_membership.`user_id` = user_entity.`id`
               AND tenant_membership.`tenant_id` = user_entity.`tenant_id`
               AND tenant_membership.`status` = 'ACTIVE'
              SET user_entity.`tenant_id` = NULL
              WHERE user_entity.`tenant_id` IS NOT NULL
                AND tenant_membership.`user_id` IS NULL;

              DELETE auth_method
              FROM `user_authentication_method` auth_method
              JOIN (
                SELECT
                  tenant_membership.`user_id`,
                  COALESCE(
                    MAX(CASE
                      WHEN tenant_membership.`status` = 'ACTIVE' AND tenant_membership.`is_default` = 1
                        THEN tenant_membership.`tenant_id`
                    END),
                    MIN(CASE
                      WHEN tenant_membership.`status` = 'ACTIVE'
                        THEN tenant_membership.`tenant_id`
                    END)
                  ) AS `tenant_id`
                FROM `tenant_user` tenant_membership
                GROUP BY tenant_membership.`user_id`
              ) membership_map
                ON membership_map.`user_id` = auth_method.`user_id`
              JOIN `user_authentication_method` target_method
                ON target_method.`user_id` = auth_method.`user_id`
               AND target_method.`tenant_id` = membership_map.`tenant_id`
               AND target_method.`authentication_provider` = auth_method.`authentication_provider`
               AND target_method.`authentication_type` = auth_method.`authentication_type`
               AND target_method.`id` <> auth_method.`id`
              WHERE membership_map.`tenant_id` IS NOT NULL
                AND auth_method.`tenant_id` <> membership_map.`tenant_id`;

              UPDATE `user_authentication_method` auth_method
              JOIN (
                SELECT
                  tenant_membership.`user_id`,
                  COALESCE(
                    MAX(CASE
                      WHEN tenant_membership.`status` = 'ACTIVE' AND tenant_membership.`is_default` = 1
                        THEN tenant_membership.`tenant_id`
                    END),
                    MIN(CASE
                      WHEN tenant_membership.`status` = 'ACTIVE'
                        THEN tenant_membership.`tenant_id`
                    END)
                  ) AS `tenant_id`
                FROM `tenant_user` tenant_membership
                GROUP BY tenant_membership.`user_id`
              ) membership_map
                ON membership_map.`user_id` = auth_method.`user_id`
              SET auth_method.`tenant_id` = membership_map.`tenant_id`
              WHERE membership_map.`tenant_id` IS NOT NULL
                AND auth_method.`tenant_id` <> membership_map.`tenant_id`;
