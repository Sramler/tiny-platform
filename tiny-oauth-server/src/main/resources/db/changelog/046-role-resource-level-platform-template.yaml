databaseChangeLog:
  # 平台模板与 default 租户解耦：role/resource 增加 level 字段，tenant_id 可空；平台模板行 tenant_id IS NULL。
  # 见 docs/TINY_PLATFORM_AUTHORIZATION_LEGACY_REMOVAL_PLAN.md §4、Phase1 技术设计 §4.4/4.5
  - changeSet:
      id: 046-role-resource-level-platform-template
      author: tiny
      comment: role/resource 增加 role_level/resource_level，tenant_id 可空；PLATFORM 时 tenant_id 必为 NULL
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - dbms:
            type: mysql
        - tableExists:
            tableName: role
        - tableExists:
            tableName: resource
        - tableExists:
            tableName: role_resource
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            stripComments: false
            sql: |
              ALTER TABLE `role`
                MODIFY COLUMN `tenant_id` BIGINT NULL COMMENT '租户ID；PLATFORM 模板时为 NULL',
                ADD COLUMN `role_level` VARCHAR(16) NOT NULL DEFAULT 'TENANT' COMMENT '模板层级：PLATFORM/TENANT';
              ALTER TABLE `resource`
                MODIFY COLUMN `tenant_id` BIGINT NULL COMMENT '租户ID；PLATFORM 模板时为 NULL',
                ADD COLUMN `resource_level` VARCHAR(16) NOT NULL DEFAULT 'TENANT' COMMENT '模板层级：PLATFORM/TENANT';
              ALTER TABLE `role`   ADD CONSTRAINT `chk_role_level_tenant` CHECK (`role_level` <> 'PLATFORM' OR `tenant_id` IS NULL);
              ALTER TABLE `role`   ADD CONSTRAINT `chk_role_level_tenant_id` CHECK (`role_level` <> 'TENANT' OR `tenant_id` IS NOT NULL);
              ALTER TABLE `resource` ADD CONSTRAINT `chk_resource_level_tenant` CHECK (`resource_level` <> 'PLATFORM' OR `tenant_id` IS NULL);
              ALTER TABLE `resource` ADD CONSTRAINT `chk_resource_level_tenant_id` CHECK (`resource_level` <> 'TENANT' OR `tenant_id` IS NOT NULL);
              ALTER TABLE `role_resource` MODIFY COLUMN `tenant_id` BIGINT NULL COMMENT '租户ID；平台模板关联时为 NULL';
