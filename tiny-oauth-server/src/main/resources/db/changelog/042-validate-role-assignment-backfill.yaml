databaseChangeLog:
  - changeSet:
      id: 042-validate-role-assignment-backfill
      author: tiny
      comment: 校验 041 回填后 role_assignment 与 user_role 一致；无 user_role 时不解析含该表的 SQL（避免 MySQL 解析期报错）
      validCheckSum:
        - ANY
      preConditions:
        - onFail: HALT
        - onError: HALT
        - dbms:
            type: mysql
        - tableExists:
            tableName: role_assignment
      changes:
        - sql:
            dbms: mysql
            splitStatements: true
            endDelimiter: ;
            stripComments: false
            sql: |
              SET @has_user_role := (
                SELECT COUNT(*)
                FROM INFORMATION_SCHEMA.TABLES
                WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'user_role'
              );
              SET @q := IF(
                @has_user_role = 0,
                'SELECT 0 INTO @mismatch_cnt',
                'SELECT COUNT(*) INTO @mismatch_cnt FROM (SELECT ur.user_id, ur.tenant_id, ur.role_id FROM user_role ur LEFT JOIN role_assignment ra ON ra.principal_type = ''USER'' AND ra.principal_id = ur.user_id AND ra.role_id = ur.role_id AND ra.scope_type = ''TENANT'' AND ra.tenant_id = ur.tenant_id AND ra.scope_id = ur.tenant_id AND ra.status = ''ACTIVE'' WHERE ra.id IS NULL UNION ALL SELECT ra.principal_id AS user_id, ra.tenant_id, ra.role_id FROM role_assignment ra LEFT JOIN user_role ur ON ur.user_id = ra.principal_id AND ur.role_id = ra.role_id AND ur.tenant_id = ra.tenant_id WHERE ra.principal_type = ''USER'' AND ra.scope_type = ''TENANT'' AND ra.status = ''ACTIVE'' AND ur.user_id IS NULL) diff'
              );
              PREPARE p FROM @q;
              EXECUTE p;
              DEALLOCATE PREPARE p;
              SET @sig := IF(
                IFNULL(@mismatch_cnt, 0) > 0,
                'SIGNAL SQLSTATE ''45000'' SET MESSAGE_TEXT = ''042 role_assignment vs user_role mismatch''',
                'SELECT 1'
              );
              PREPARE s FROM @sig;
              EXECUTE s;
              DEALLOCATE PREPARE s;
