databaseChangeLog:
  - changeSet:
      id: 133-create-user-auth-credential
      author: tiny
      comment: 新增认证凭证表，承载认证材料，不承载作用域策略
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: user_auth_credential
      changes:
        - createTable:
            tableName: user_auth_credential
            remarks: 用户认证凭证表（材料层）
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  remarks: 主键ID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  remarks: 用户ID
                  constraints:
                    nullable: false
              - column:
                  name: authentication_provider
                  type: VARCHAR(50)
                  remarks: 认证提供者
                  constraints:
                    nullable: false
              - column:
                  name: authentication_type
                  type: VARCHAR(50)
                  remarks: 认证类型
                  constraints:
                    nullable: false
              - column:
                  name: authentication_configuration
                  type: JSON
                  remarks: 认证材料配置JSON
                  constraints:
                    nullable: false
              - column:
                  name: last_verified_at
                  type: TIMESTAMP
                  remarks: 最后验证时间
              - column:
                  name: last_verified_ip
                  type: VARCHAR(50)
                  remarks: 最后验证IP
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  remarks: 凭证过期时间
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_auth_credential
            columnNames: user_id, authentication_provider, authentication_type
            constraintName: uk_user_auth_credential_user_provider_type
        - createIndex:
            tableName: user_auth_credential
            indexName: idx_user_auth_credential_user_id
            columns:
              - column:
                  name: user_id
        - addForeignKeyConstraint:
            baseTableName: user_auth_credential
            baseColumnNames: user_id
            constraintName: fk_user_auth_credential_user
            referencedTableName: user
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 133-create-user-auth-scope-policy
      author: tiny
      comment: 新增认证作用域策略表，承载GLOBAL/PLATFORM/TENANT策略，不承载认证材料
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: user_auth_scope_policy
      changes:
        - createTable:
            tableName: user_auth_scope_policy
            remarks: 用户认证作用域策略表（策略层）
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  remarks: 主键ID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: credential_id
                  type: BIGINT
                  remarks: 关联认证凭证ID
                  constraints:
                    nullable: false
              - column:
                  name: scope_type
                  type: VARCHAR(16)
                  remarks: 作用域类型 GLOBAL/PLATFORM/TENANT
                  constraints:
                    nullable: false
              - column:
                  name: scope_id
                  type: BIGINT
                  remarks: 作用域ID（GLOBAL可为空）
              - column:
                  name: scope_key
                  type: VARCHAR(128)
                  remarks: 作用域归一化键
                  constraints:
                    nullable: false
              - column:
                  name: is_primary_method
                  type: BOOLEAN
                  defaultValueBoolean: false
                  remarks: 是否主认证方式
                  constraints:
                    nullable: false
              - column:
                  name: is_method_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  remarks: 是否启用认证方式
                  constraints:
                    nullable: false
              - column:
                  name: authentication_priority
                  type: INT
                  defaultValueNumeric: 0
                  remarks: 认证优先级
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_auth_scope_policy
            columnNames: credential_id, scope_key
            constraintName: uk_user_auth_scope_policy_credential_scope_key
        - createIndex:
            tableName: user_auth_scope_policy
            indexName: idx_user_auth_scope_policy_scope_type_id
            columns:
              - column:
                  name: scope_type
              - column:
                  name: scope_id
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE user_auth_scope_policy
              ADD CONSTRAINT chk_user_auth_scope_policy_scope_type
              CHECK (scope_type IN ('GLOBAL', 'PLATFORM', 'TENANT'))
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE user_auth_scope_policy
              ADD CONSTRAINT chk_user_auth_scope_policy_scope_id_by_type
              CHECK (
                (scope_type IN ('GLOBAL', 'PLATFORM') AND scope_id IS NULL)
                OR (scope_type = 'TENANT' AND scope_id IS NOT NULL)
              )
        - addForeignKeyConstraint:
            baseTableName: user_auth_scope_policy
            baseColumnNames: credential_id
            constraintName: fk_user_auth_scope_policy_credential
            referencedTableName: user_auth_credential
            referencedColumnNames: id
            onDelete: CASCADE
