databaseChangeLog:
  # 表结构创建（包含所有业务表和 Quartz 表）
  - include:
      file: 002-create-schema.yaml
      relativeToChangelogFile: true

  # 初始数据插入
  - include:
      file: 003-insert-initial-data.yaml
      relativeToChangelogFile: true

  # 调度中心示例数据（幂等；003 已执行过的库可由此补数据）
  - include:
      file: 011-insert-scheduling-demo.yaml
      relativeToChangelogFile: true

  # scheduling_dag 增加 cron_expression 列（Cron 持久化与重启恢复）
  - include:
      file: 012-add-dag-cron-expression.yaml
      relativeToChangelogFile: true

  # scheduling_task_instance 增加 concurrency_key 与索引（KEYED 并发策略）
  - include:
      file: 013-add-task-instance-concurrency-key.yaml
      relativeToChangelogFile: true

  # 回填 concurrency_key 历史数据（KEYED 兼容）
  - include:
      file: 014-backfill-task-instance-concurrency-key.yaml
      relativeToChangelogFile: true

  # scheduling_task_instance 增加 error_message（失败/超时原因，与 result 分离）
  - include:
      file: 015-add-task-instance-error-message.yaml
      relativeToChangelogFile: true

  # resource.enabled 默认值对齐实体（DEFAULT 1，与 Resource.enabled=true 一致）
  - include:
      file: 016-align-resource-enabled-default.yaml
      relativeToChangelogFile: true

  # resource 类型级约束：接口类型(type=3)必须填写 uri 与 method
  - include:
      file: 017-add-resource-api-uri-method-check.yaml
      relativeToChangelogFile: true

  # auth 表补充 tenant_id 与租户级唯一约束
  - include:
      file: 018-add-tenant-id-auth.yaml
      relativeToChangelogFile: true

  # 租户表与租户外键约束
  - include:
      file: 020-add-tenant-table.yaml
      relativeToChangelogFile: true

  # 扩展租户字段（域名/套餐/配额/联系人）
  - include:
      file: 021-extend-tenant-fields.yaml
      relativeToChangelogFile: true

  # 认证审计租户解析字段（tenant_id 可空 + reason code）
  - include:
      file: 022-auth-audit-tenant-resolution.yaml
      relativeToChangelogFile: true

  # 认证审计租户来源字段（token/session/login_param）
  - include:
      file: 023-auth-audit-tenant-source.yaml
      relativeToChangelogFile: true

  # HTTP 请求日志链路增强：客户端请求ID/租户/issuer/trace来源
  - include:
      file: 024-http-request-log-trace-hardening.yaml
      relativeToChangelogFile: true

  # 幂等表迁移到 Liquibase 管理，避免运行时建表
  - include:
      file: 025-create-idempotent-token-table.yaml
      relativeToChangelogFile: true

  # dict 核心表（fresh install 基础表，供后续字典迁移和初始化复用）
  - include:
      file: 025a-create-dict-core-tables.yaml
      relativeToChangelogFile: true

  # OAuth2 Authorization Server JDBC 基础表（fresh install 基础表）
  - include:
      file: 025b-create-oauth2-authorization-tables.yaml
      relativeToChangelogFile: true

  # dict_type.dict_code 唯一约束调整为租户作用域唯一
  - include:
      file: 026-scope-dict-code-by-tenant.yaml
      relativeToChangelogFile: true

  # 为默认平台租户补充幂等治理菜单与授权
  - include:
      file: 027-add-idempotent-ops-menu.yaml
      relativeToChangelogFile: true

  # 幂等治理控制台：规则表与黑名单表
  - include:
      file: 028-create-idempotent-console-tables.yaml
      relativeToChangelogFile: true

  # 幂等治理指标分钟聚合表
  - include:
      file: 029-create-idempotent-metric-minute-table.yaml
      relativeToChangelogFile: true

  # 幂等治理指标分钟聚合补充 tenant 维度
  - include:
      file: 030-add-tenant-id-to-idempotent-metric-minute.yaml
      relativeToChangelogFile: true

  # 调度实例执行快照 + task_history 补 tenant 维度
  - include:
      file: 031-scheduling-execution-snapshot-and-history-tenant.yaml
      relativeToChangelogFile: true

  # 调度核心表 tenant_id 非空化与租户索引补齐
  - include:
      file: 032-tighten-scheduling-tenant-constraints.yaml
      relativeToChangelogFile: true

  # scheduling_task.code 收紧为租户内唯一
  - include:
      file: 033-add-scheduling-task-tenant-code-unique.yaml
      relativeToChangelogFile: true

  # 约束单 DAG 仅允许一个 ACTIVE 版本
  - include:
      file: 034-enforce-single-active-dag-version.yaml
      relativeToChangelogFile: true

  # 确保 scheduling_dag_version 在 Liquibase 链路下也具备 (dag_id, version_no) 唯一约束
  - include:
      file: 035-enforce-dag-version-no-unique.yaml
      relativeToChangelogFile: true

  # 为 DAG 版本/节点/边补充 tenant_id 并回填收紧约束
  - include:
      file: 036-add-tenant-id-to-scheduling-dag-metadata.yaml
      relativeToChangelogFile: true

  # 为默认租户补充调度 RBAC authority 资源，并授予 ROLE_ADMIN 调度全权限
  - include:
      file: 037-add-scheduling-rbac-authorities.yaml
      relativeToChangelogFile: true

  # 清理历史上被复制到非默认租户的平台级菜单与角色绑定
  - include:
      file: 038-cleanup-platform-only-menus-from-non-default-tenants.yaml
      relativeToChangelogFile: true

  # 统一历史权限标识到规范码
  - include:
      file: 039-normalize-permission-codes.yaml
      relativeToChangelogFile: true

  # 统一历史控制面菜单资源 URI 到当前 /sys/* 控制器路径
  - include:
      file: 040-normalize-control-plane-resource-uris.yaml
      relativeToChangelogFile: true

  # 新增 tenant_user membership 与 role_assignment，并回填旧 user/user_role 数据
  - include:
      file: 041-add-tenant-user-and-role-assignment.yaml
      relativeToChangelogFile: true

  # 校验 041 回填一致性：role_assignment 与 user_role 不得有差异
  - include:
      file: 042-validate-role-assignment-backfill.yaml
      relativeToChangelogFile: true

  # 将 user_role 重命名为 user_role_legacy（停止运行时使用，仅保留观察期）
  - include:
      file: 043-rename-user-role-legacy.yaml
      relativeToChangelogFile: true

  # user.tenant_id 可空并删除 uk_user_tenant_username，停双写，授权以 tenant_user 为准
  - include:
      file: 044-user-tenant-id-nullable-stop-dual-write.yaml
      relativeToChangelogFile: true

  # 全局 username 唯一（需先清理跨租户重名）
  - include:
      file: 045-user-username-global-unique.yaml
      relativeToChangelogFile: true

  # role/resource 增加 level、tenant_id 可空；平台模板与 default 解耦准备
  - include:
      file: 046-role-resource-level-platform-template.yaml
      relativeToChangelogFile: true

  # Phase 2 (RBAC3) - role governance tables
  - include:
      file: 051-role-hierarchy.yaml
      relativeToChangelogFile: true
  - include:
      file: 052-role-mutex.yaml
      relativeToChangelogFile: true
  - include:
      file: 053-role-prerequisite.yaml
      relativeToChangelogFile: true
  - include:
      file: 054-role-cardinality.yaml
      relativeToChangelogFile: true
  - include:
      file: 055-role-constraint-violation-log.yaml
      relativeToChangelogFile: true
  - include:
      file: 056-role-constraint-violation-log-indexes.yaml
      relativeToChangelogFile: true

  # 删除 user_role_legacy 表，结束兼容观察期（运行态仅依赖 role_assignment）
  - include:
      file: 047-drop-user-role-legacy.yaml
      relativeToChangelogFile: true

  # 为 tenant 表增加 lifecycle_status 字段，用于冻结/下线治理（ACTIVE/FROZEN/DECOMMISSIONED）
  - include:
      file: 048-tenant-lifecycle-status.yaml
      relativeToChangelogFile: true

  # 数据修复：修复资源 URL 格式
  - include:
      file: 004-fix-resource-url-format.yaml
      relativeToChangelogFile: true

  # 清理重复数据（在添加唯一约束之前）
  - include:
      file: 006-cleanup-duplicate-resources.yaml
      relativeToChangelogFile: true

  # 添加 resource 表唯一约束
  - include:
      file: 005-add-resource-unique-constraint.yaml
      relativeToChangelogFile: true

  # 扩展 demo_export_usage 表字段
  - include:
      file: 007-extend-demo-export-usage-fields.yaml
      relativeToChangelogFile: true

  # demo_export_usage tenant_code -> tenant_id
  - include:
      file: 019-rename-demo-export-tenant-id.yaml
      relativeToChangelogFile: true

  # 为字典表添加内置标识和锁定字段（必须在字典初始化之前执行）
  - include:
      file: 009-add-dict-builtin-fields.yaml
      relativeToChangelogFile: true

  # 初始化默认字典数据（幂等执行，不会重复加载）
  - include:
      file: 008-init-default-dicts.yaml
      relativeToChangelogFile: true

  # 存储过程创建（使用 runOnChange 自动检测 SQL 文件变化并重新执行）
  - changeSet:
      id: create-demo-export-usage-procedure
      author: tiny
      runOnChange: true
      comment: 创建/更新 demo_export_usage 测试数据生成存储过程
      changes:
        - sql:
            dbms: mysql
            sql: "DROP PROCEDURE IF EXISTS sp_generate_demo_export_usage"
        - sqlFile:
            path: classpath:db/changelog/001-create-demo-export-usage-procedure.sql
            relativeToChangelogFile: false
            splitStatements: false
            stripComments: false
