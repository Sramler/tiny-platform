# Real E2E profile.
# All mutable or sensitive values must come from environment variables.

server:
  port: ${E2E_BACKEND_PORT:9000}
  error:
    include-stacktrace: on-param
    include-message: always
    include-binding-errors: always

spring:
  autoconfigure:
    exclude:
      - org.camunda.bpm.spring.boot.starter.rest.CamundaBpmRestJerseyAutoConfiguration
  datasource:
    url: >-
      jdbc:mysql://${E2E_DB_HOST:127.0.0.1}:${E2E_DB_PORT:3306}/${E2E_DB_NAME:tiny_web}
      ?useSSL=false
      &allowPublicKeyRetrieval=true
      &useUnicode=true
      &characterEncoding=UTF-8
      &serverTimezone=Asia/Shanghai
      &sessionVariables=transaction_isolation='READ-COMMITTED'
      &rewriteBatchedStatements=true
    username: ${E2E_DB_USER:root}
    password: ${E2E_DB_PASSWORD:${MYSQL_ROOT_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    enabled: true

camunda:
  bpm:
    enabled: false
    database:
      schema-update: create-drop

frontend:
  login-url: redirect:${E2E_FRONTEND_BASE_URL:http://localhost:5173}/login
  totp-bind-url: redirect:${E2E_FRONTEND_BASE_URL:http://localhost:5173}/self/security/totp-bind
  totp-verify-url: redirect:${E2E_FRONTEND_BASE_URL:http://localhost:5173}/self/security/totp-verify

logging:
  file:
    path: ./logs
  level:
    root: INFO
    com.tiny.oauthserver: INFO
    org.springframework.security: INFO

http:
  request-log:
    enabled: true
