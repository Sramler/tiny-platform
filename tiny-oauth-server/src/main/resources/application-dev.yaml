# 开发环境配置
# 使用方式: spring.profiles.active=dev
#
# 在开发环境中，前端运行在 Vite dev server (http://localhost:5173)
# 后端通过重定向将请求转发到前端开发服务器

# 历史库若从未触发过平台模板回填（无 tenant_id IS NULL 的 role/resource），
# platform_admin 与 ensure-platform-admin.sh 会缺少「平台模板 ROLE_PLATFORM_ADMIN」（须显式 PLATFORM_TENANT_CODE，见 CARD-13E）。
# 启动时自动从 platform-tenant-code 指向的租户复制一份平台模板（仅开发环境建议开启）。
tiny:
  platform:
    tenant:
      auto-initialize-platform-template-if-missing: true
      # Local real-link may run under dev profile; only use an explicitly supplied bootstrap source tenant code.
      platform-tenant-code: ${E2E_PLATFORM_TENANT_CODE:}

server:
  error:
    # 开发环境：始终显示异常堆栈信息，便于调试
    include-stacktrace: always
    include-message: always
    include-binding-errors: always

spring:
frontend:
  # 登录页面 - 重定向到 Vite dev server（real-link E2E 可通过 E2E_FRONTEND_BASE_URL 覆盖端口）
  login-url: redirect:${E2E_FRONTEND_BASE_URL:http://localhost:5173}/login
  # TOTP 绑定页面 - 重定向到 Vite dev server
  totp-bind-url: redirect:${E2E_FRONTEND_BASE_URL:http://localhost:5173}/self/security/totp-bind
  # TOTP 验证页面 - 重定向到 Vite dev server
  totp-verify-url: redirect:${E2E_FRONTEND_BASE_URL:http://localhost:5173}/self/security/totp-verify
# 开发环境日志配置
logging:
  # 日志文件路径（开发环境可以使用相对路径）
  file:
    path: ./logs
  # 异步日志配置（开发环境使用较小的队列，便于快速发现问题）
  async:
    queue-size: 256 # 队列大小：开发环境较小，便于快速响应
    discard-threshold: 0 # 不丢弃日志：开发环境需要完整日志
  # 日志级别：开发环境可以更详细
  level:
    root: INFO
    # 关闭或压低 RMI/JMX 相关日志
    sun.rmi.transport.tcp: WARN
    sun.rmi.loader: WARN
    javax.management.remote.rmi: WARN
    # Hibernate Validator 启动噪音
    #org.hibernate.validator: WARN
    #org.hibernate.validator.internal: WARN
    com.tiny.oauthserver: DEBUG # 业务代码 DEBUG 级别，便于调试
    com.tiny.oauthserver.sys.security.MultiAuthenticationProvider: DEBUG
    com.tiny.oauthserver.sys.security.UserDetailsServiceImpl: DEBUG
    com.tiny.oauthserver.sys.service.impl.SecurityServiceImpl: DEBUG
    com.tiny.oauthserver.config.CustomJdbcOAuth2AuthorizationService: DEBUG
    com.tiny.oauthserver.config: DEBUG
    org.springframework.security: TRACE # 安全框架 TRACE，便于排查认证问题
    # Spring Security 配置警告：开发环境保持 WARN，便于发现问题
    # 这是预期的配置：MultiAuthenticationProvider 内部使用 UserDetailsService，符合设计
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: WARN
    org.camunda.bpm.engine.persistence: DEBUG
    org.camunda.bpm.engine.impl.db.sql: DEBUG
    org.camunda.bpm.engine.impl.persistence.entity: DEBUG
    org.camunda.bpm.engine.impl.persistence: DEBUG
    com.zaxxer.hikari: INFO
    org.hibernate.SQL: INFO # SQL 日志 DEBUG，便于查看完整 SQL
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    org.hibernate.orm.jdbc.bind: INFO # 参数绑定 TRACE
    org.camunda: INFO

# HTTP 请求日志配置（开发环境：记录更多信息，便于调试）
http:
  request-log:
    enabled: true
    include-request-body: true # 开发环境记录请求体，便于调试
    include-response-body: true # 开发环境记录响应体，便于调试
    max-body-length: 1048576 # 1MB，开发环境可以更大
    excluded-path-prefixes:
      - /actuator
      - /dist
      - /static
      - /webjars

# Permission refactor gray-run defaults for dev verification (Phase F)
permission-refactor:
  authority-diff-log-enabled: true
  permission-version-debug-enabled: true
  fail-closed-strict-enabled: true
  # Larger tenant expansion: keep existing set and add one medium-complexity tenant.
  gray-tenant-allow-list: [1, 3, 5, 6]
  # DEPT real gray expansion round.
  gray-scope-type-allow-list: [PLATFORM, TENANT, ORG, DEPT]
  diff-sample-rate: 1.0
  # Stage 2 canary-read (read path only), keep low-risk defaults.
  menu-canary-read-enabled: true
  menu-canary-tenant-allow-list: [1, 3]
  menu-canary-sample-rate: 1.0
