name: Verify webapp real-link E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  verify-webapp-real-e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
          MYSQL_DATABASE: tiny_web
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    defaults:
      run:
        working-directory: tiny-oauth-server/src/main/webapp

    env:
      E2E_FRONTEND_PORT: 5173
      E2E_BACKEND_PORT: 9000
      E2E_FRONTEND_BASE_URL: http://localhost:5173
      E2E_BACKEND_BASE_URL: http://localhost:9000
      E2E_BACKEND_PROFILE: e2e
      E2E_ENABLE_OIDC_TRACE: false
      E2E_USE_SQL_SEED: false
      E2E_DB_HOST: 127.0.0.1
      E2E_DB_PORT: 3306
      E2E_DB_NAME: tiny_web
      E2E_DB_USER: root
      E2E_DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      E2E_MYSQL_HOST: 127.0.0.1
      E2E_MYSQL_PORT: 3306
      E2E_MYSQL_DATABASE: tiny_web
      E2E_MYSQL_USER: root
      E2E_MYSQL_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      E2E_OIDC_CLIENT_ID: vue-client
      E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_TOTP_SECRET: ${{ secrets.E2E_TOTP_SECRET }}
      E2E_TENANT_CODE_B: ${{ secrets.E2E_TENANT_CODE_B }}
      E2E_USERNAME_B: ${{ secrets.E2E_USERNAME_B }}
      E2E_PASSWORD_B: ${{ secrets.E2E_PASSWORD_B }}
      E2E_TOTP_SECRET_B: ${{ secrets.E2E_TOTP_SECRET_B }}
      E2E_TENANT_CODE_BIND: ${{ secrets.E2E_TENANT_CODE_BIND }}
      E2E_USERNAME_BIND: ${{ secrets.E2E_USERNAME_BIND }}
      E2E_PASSWORD_BIND: ${{ secrets.E2E_PASSWORD_BIND }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate real-link secret set
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in \
            E2E_DB_PASSWORD \
            E2E_TENANT_CODE \
            E2E_USERNAME \
            E2E_PASSWORD \
            E2E_TOTP_SECRET \
            E2E_TENANT_CODE_B \
            E2E_USERNAME_B \
            E2E_PASSWORD_B \
            E2E_TOTP_SECRET_B \
            E2E_USERNAME_BIND \
            E2E_PASSWORD_BIND
          do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "## Missing real-link E2E secrets"
              echo
              echo "The workflow requires dedicated automation identities and database credentials."
              echo
              echo "Missing:"
              for key in "${missing[@]}"; do
                echo "- \`$key\`"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tiny-oauth-server/src/main/webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Run real-link setup regression
        run: npm run test:unit -- src/e2e/realGlobalSetup.test.ts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run real-link E2E
        run: npm run test:e2e:real -- --reporter=line
