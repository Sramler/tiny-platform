name: Open prepared backport PR to sb3

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: Prepared backport branch created from sb3 and cherry-picked from sb4
        required: true
      target_branch:
        description: Target maintenance branch
        required: false
        default: sb3

permissions:
  contents: read
  pull-requests: write

env:
  SOURCE_BRANCH: ${{ github.event.inputs.source_branch }}
  TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'sb3' }}

concurrency:
  group: open-backport-to-sb3-${{ github.event.inputs.source_branch }}
  cancel-in-progress: false

jobs:
  open-backport-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check target branch
        id: target
        uses: actions/github-script@v8
        env:
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.TARGET_BRANCH;

            try {
              await github.rest.repos.getBranch({ owner, repo, branch });
              core.setOutput("exists", "true");
              core.info(`Target branch ${branch} exists.`);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
                core.warning(`Target branch ${branch} does not exist. Skip PR creation.`);
                return;
              }
              throw error;
            }

      - name: Check source branch
        id: source
        uses: actions/github-script@v8
        env:
          SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const source = process.env.SOURCE_BRANCH;
            const target = process.env.TARGET_BRANCH;
            const forbidden = new Set(["sb4", "main", "master"]);

            if (!source) {
              core.setOutput("valid", "false");
              core.warning("Source branch is empty.");
              return;
            }
            if (source === target) {
              core.setOutput("valid", "false");
              core.warning("Source branch must differ from target branch.");
              return;
            }
            if (forbidden.has(source)) {
              core.setOutput("valid", "false");
              core.warning(`Source branch ${source} is forbidden. Prepare a dedicated sb3 backport branch first.`);
              return;
            }

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: source });
              core.setOutput("valid", "true");
              core.info(`Source branch ${source} exists.`);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("valid", "false");
                core.warning(`Source branch ${source} does not exist.`);
                return;
              }
              throw error;
            }

      - name: Summarize invalid setup
        if: steps.target.outputs.exists != 'true' || steps.source.outputs.valid != 'true'
        run: |
          {
            echo "## sb3 backport PR"
            echo
            echo "- Source branch: \`${SOURCE_BRANCH}\`"
            echo "- Target branch: \`${TARGET_BRANCH}\`"
            echo "- Result: skipped because source or target branch is invalid"
            echo "- Rule: only a prepared sb3 backport branch may be used as source; do not open whole-line \`sb4 -> sb3\` sync PRs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check diff and existing PR
        id: status
        if: steps.target.outputs.exists == 'true' && steps.source.outputs.valid == 'true'
        uses: actions/github-script@v8
        env:
          SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const source = process.env.SOURCE_BRANCH;
            const target = process.env.TARGET_BRANCH;

            const { data: comparison } = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: target,
              head: source,
            });

            core.setOutput("ahead_by", String(comparison.ahead_by));
            core.setOutput("behind_by", String(comparison.behind_by));
            core.setOutput("status", comparison.status);

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              base: target,
              head: `${owner}:${source}`,
              per_page: 100,
            });

            core.setOutput("has_open_pr", pulls.length > 0 ? "true" : "false");
            core.setOutput("open_pr_url", pulls[0]?.html_url || "");

            core.info(`Compare status=${comparison.status}, ahead_by=${comparison.ahead_by}, behind_by=${comparison.behind_by}`);
            core.info(`Open backport PR exists=${pulls.length > 0}`);

      - name: Summarize no-op state
        if: steps.target.outputs.exists == 'true' && steps.source.outputs.valid == 'true' && (steps.status.outputs.has_open_pr == 'true' || steps.status.outputs.ahead_by == '0')
        run: |
          {
            echo "## sb3 backport PR"
            echo
            echo "- Source branch: \`${SOURCE_BRANCH}\`"
            echo "- Target branch: \`${TARGET_BRANCH}\`"
            echo "- Compare status: \`${{ steps.status.outputs.status }}\`"
            echo "- Ahead by: \`${{ steps.status.outputs.ahead_by }}\`"
            echo "- Behind by: \`${{ steps.status.outputs.behind_by }}\`"
            if [ "${{ steps.status.outputs.has_open_pr }}" = "true" ]; then
              echo "- Result: existing open backport PR reused"
              echo "- Open PR: ${{ steps.status.outputs.open_pr_url }}"
            else
              echo "- Result: no new PR required"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create backport PR
        id: create
        if: steps.target.outputs.exists == 'true' && steps.source.outputs.valid == 'true' && steps.status.outputs.has_open_pr != 'true' && steps.status.outputs.ahead_by != '0'
        uses: actions/github-script@v8
        env:
          SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const source = process.env.SOURCE_BRANCH;
            const target = process.env.TARGET_BRANCH;

            const title = `backport: ${source} -> ${target}`;
            const body = [
              "> 手工触发的维护回补 PR，用于把 **已经准备好的 sb3 backport 分支** 合入 `sb3`。",
              "> 本 workflow 不负责从 `sb4` 自动挑提交，也不允许整线 `sb4 -> sb3` 同步。",
              "> 参考：",
              "> - docs/TINY_PLATFORM_SB4_SB3_BRANCH_STRATEGY.md",
              "",
              "## 变更内容",
              "",
              `- 将准备好的 backport 分支 \`${source}\` 合入维护线 \`${target}\`。`,
              "",
              "## 变更原因",
              "",
              "- 维护线 `sb3` 只接选择性回补的稳定修复，不做周期性整线同步。",
              "",
              "## 分支归属 / 同步要求",
              "",
              "- [ ] `sb4` 主干业务改动",
              "- [ ] `sb4-only` 兼容改动，仅进入 `sb4`",
              "- [x] 从 `sb4` 选择性回补到 `sb3` 的维护修复",
              `- 来源分支：\`${source}\``,
              `- 目标分支：\`${target}\``,
              "- 要求：请在 PR 中补充来源 `sb4` 提交 SHA、cherry-pick 范围和验证结果。",
              "- 建议标签：`backport-to-sb3`",
              "",
              "## 验证方式",
              "",
              "### 自动化验证",
              "",
              "```bash",
              "请填写在 sb3 目标语义下重新执行过的验证命令；不要直接复用 sb4 的通过结果。",
              "```",
              "",
              "### 手动检查",
              "",
              "1. 确认 source 是从 `sb3` 拉出的 backport 分支，而不是整条 `sb4`。",
              "2. 确认 PR 已记录来源 `sb4` 提交 SHA。",
              "3. 确认 `sb3` 目标分支验证已重新执行。",
            ].join("\n");

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: source,
              base: target,
              body,
              maintainer_can_modify: true,
            });

            core.setOutput("url", pr.html_url);
            core.setOutput("number", String(pr.number));
            core.info(`Created PR #${pr.number}: ${pr.html_url}`);

      - name: Summarize created PR
        if: steps.create.outputs.url != ''
        run: |
          {
            echo "## sb3 backport PR"
            echo
            echo "- Source branch: \`${SOURCE_BRANCH}\`"
            echo "- Target branch: \`${TARGET_BRANCH}\`"
            echo "- Result: created"
            echo "- PR: ${{ steps.create.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
