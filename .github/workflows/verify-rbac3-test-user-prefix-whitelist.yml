name: Verify RBAC3 test user prefix whitelist

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify RBAC3 test user prefix whitelist
        run: |
          bash tiny-oauth-server/scripts/verify-rbac3-test-user-prefix-whitelist.sh

