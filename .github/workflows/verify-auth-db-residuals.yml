name: Verify auth DB residuals / rollout consistency

# PR/push：仅在影响 tiny-oauth-server 或本 workflow / 根 pom 时触发，避免无关改动跑重 job。
# schedule / workflow_dispatch：仍每次全量执行。
on:
  push:
    branches: [main]
    paths:
      - 'tiny-oauth-server/**'
      - '.github/workflows/verify-auth-db-residuals.yml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'tiny-oauth-server/**'
      - '.github/workflows/verify-auth-db-residuals.yml'
      - 'pom.xml'
  workflow_dispatch:
  schedule:
    - cron: '10 2 * * *'

jobs:
  verify-auth-db-residuals:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
          MYSQL_DATABASE: tiny_web
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      E2E_BACKEND_PORT: 9000
      E2E_BACKEND_BASE_URL: http://localhost:9000
      E2E_BACKEND_PROFILE: e2e

      E2E_DB_HOST: 127.0.0.1
      E2E_DB_PORT: 3306
      E2E_DB_NAME: tiny_web
      E2E_DB_USER: root
      E2E_DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prime backend Maven dependencies
        shell: bash
        run: |
          set -euo pipefail
          mvn -pl tiny-oauth-server -DskipTests test-compile

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Start backend
        env:
          SPRING_PROFILES_ACTIVE: ${{ env.E2E_BACKEND_PROFILE }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/tiny-platform-auth-db-residuals
          mvn -pl tiny-oauth-server spring-boot:run \
            > /tmp/tiny-platform-auth-db-residuals/backend.log 2>&1 &
          echo $! > /tmp/tiny-platform-auth-db-residuals/backend.pid

          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${E2E_BACKEND_PORT}/login" >/dev/null 2>&1; then
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/tiny-platform-auth-db-residuals/backend.pid)" 2>/dev/null; then
              echo "Backend exited before becoming ready."
              tail -n 200 /tmp/tiny-platform-auth-db-residuals/backend.log || true
              exit 1
            fi
            sleep 2
          done

          echo "Backend did not become ready in time."
          tail -n 200 /tmp/tiny-platform-auth-db-residuals/backend.log || true
          exit 1

      - name: Verify authorization model rollout + DB consistency
        shell: bash
        run: |
          set -euo pipefail
          bash tiny-oauth-server/scripts/verify-authorization-model-rollout.sh

      - name: Stop started backend
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f /tmp/tiny-platform-auth-db-residuals/backend.pid ]; then
            pid="$(cat /tmp/tiny-platform-auth-db-residuals/backend.pid)"
            kill "$pid" 2>/dev/null || true
          fi
