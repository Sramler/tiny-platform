name: Verify migration smoke (real MySQL)

on:
  push:
    paths:
      - 'tiny-oauth-server/**'
      - '.github/workflows/verify-migration-smoke-mysql.yml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'tiny-oauth-server/**'
      - '.github/workflows/verify-migration-smoke-mysql.yml'
      - 'pom.xml'
  workflow_dispatch: {}
  schedule:
    - cron: '20 1 * * *'

permissions:
  contents: read
  packages: read

env:
  CAMUNDA_PACKAGES_USERNAME: ${{ secrets.CAMUNDA_PACKAGES_USERNAME || github.actor }}
  CAMUNDA_PACKAGES_TOKEN: ${{ secrets.CAMUNDA_PACKAGES_TOKEN || github.token }}

jobs:
  migration-smoke-mysql:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci
          MYSQL_DATABASE: tiny_web
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      MYSQL_ROOT_PASSWORD: ci
      MYSQL_PORT: 3306
      SCHEDULING_VERIFY_DB_HOST: 127.0.0.1
      SCHEDULING_VERIFY_DB_PORT: 3306
      SCHEDULING_VERIFY_DB_USER: root
      SCHEDULING_VERIFY_DB_PASSWORD: ci
      SCHEDULING_VERIFY_DB_NAME: tiny_web
      CAMUNDA_FORK_LOCAL_INSTALL_ENABLED: ${{ vars.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED || 'false' }}
      CAMUNDA_FORK_REPOSITORY: Sramler/camunda-bpm-platform
      CAMUNDA_FORK_REF: ${{ vars.CAMUNDA_FORK_REF || '' }}
      CAMUNDA_FORK_CHECKOUT_TOKEN: ${{ secrets.CAMUNDA_FORK_CHECKOUT_TOKEN || '' }}
      MAVEN_REPO_LOCAL: ${{ runner.temp }}/m2-camunda-fork

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21 with Camunda fork packages
        if: env.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED != 'true'
        uses: ./.github/actions/setup-camunda-fork-java
        with:
          java-version: "21"

      - name: Validate CARD-C7-05C fallback inputs
        if: env.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CAMUNDA_FORK_REF}" ]; then
            echo "::error title=CARD-C7-05C fallback variable missing::CAMUNDA_FORK_LOCAL_INSTALL_ENABLED=true but CAMUNDA_FORK_REF is empty. Configure repository variable CAMUNDA_FORK_REF for the CARD-C7-05C fallback path."
            exit 1
          fi

          if [ -z "${CAMUNDA_FORK_CHECKOUT_TOKEN}" ]; then
            echo "::error title=CARD-C7-05C fallback secret missing::CAMUNDA_FORK_LOCAL_INSTALL_ENABLED=true but CAMUNDA_FORK_CHECKOUT_TOKEN is empty. Configure repository secret CAMUNDA_FORK_CHECKOUT_TOKEN for the CARD-C7-05C fallback path."
            exit 1
          fi

      - name: Set up JDK 21 for CARD-C7-05C fallback
        if: env.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Configure shared Maven local repository for CARD-C7-05C fallback
        if: env.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${MAVEN_REPO_LOCAL}"
          printf 'MAVEN_OPTS=%s\n' "${MAVEN_OPTS:+${MAVEN_OPTS} }-Dmaven.repo.local=${MAVEN_REPO_LOCAL}" >> "$GITHUB_ENV"

      - name: Checkout Camunda fork for CARD-C7-05C fallback
        if: env.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CAMUNDA_FORK_REPOSITORY }}
          ref: ${{ env.CAMUNDA_FORK_REF }}
          token: ${{ env.CAMUNDA_FORK_CHECKOUT_TOKEN }}
          path: camunda-bpm-platform-fork
          persist-credentials: false

      - name: Install Camunda fork locally for CARD-C7-05C fallback
        if: env.CAMUNDA_FORK_LOCAL_INSTALL_ENABLED == 'true'
        uses: ./.github/actions/install-camunda-fork-local
        with:
          fork-path: camunda-bpm-platform-fork
          maven-repo-local: ${{ env.MAVEN_REPO_LOCAL }}

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Build backend (skip tests)
        run: mvn -q -DskipTests package -pl tiny-oauth-server -am

      - name: Start backend (Liquibase smoke) and wait ready
        shell: bash
        run: |
          set -euo pipefail
          SPRING_PROFILES_ACTIVE=ci mvn -pl tiny-oauth-server spring-boot:run > /tmp/migration-smoke-backend.log 2>&1 &
          APP_PID=$!
          trap "kill $APP_PID 2>/dev/null || true" EXIT

          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:9000/csrf" >/dev/null 2>&1; then
              echo "Backend ready. Liquibase migration should have completed."
              exit 0
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Backend exited before becoming ready."
              tail -n 200 /tmp/migration-smoke-backend.log || true
              exit 1
            fi
            sleep 2
          done

          echo "Backend did not become ready in time."
          tail -n 200 /tmp/migration-smoke-backend.log || true
          exit 1

      - name: Verify scheduling migration artifacts
        shell: bash
        run: bash ./tiny-oauth-server/scripts/verify-scheduling-migration-smoke.sh

      - name: "Verify auth migration: user_role_legacy dropped"
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking that user_role_legacy table has been dropped (047-drop-user-role-legacy)..."
          COUNT=$(mysql -h 127.0.0.1 -P "$MYSQL_PORT" -uroot -p"$MYSQL_ROOT_PASSWORD" -D tiny_web -N -e "SHOW TABLES LIKE 'user_role_legacy';" | wc -l)
          if [ "$COUNT" -ne 0 ]; then
            echo "Expected user_role_legacy to be dropped, but table still exists."
            exit 1
          fi
          echo "user_role_legacy table not found, auth migration is consistent."
