name: Verify role_resource legacy removal (proof pack)

on:
  push:
    branches: [main]
    paths:
      - 'tiny-oauth-server/**'
      - 'tiny-web/**'
      - '.github/workflows/verify-role-resource-legacy-removal.yml'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'tiny-oauth-server/**'
      - 'tiny-web/**'
      - '.github/workflows/verify-role-resource-legacy-removal.yml'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  proof-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run legacy removal proof pack
        run: bash tiny-oauth-server/scripts/verify-role-resource-legacy-removal-proof-pack.sh
