name: Verify scheduling real-link E2E (Nightly)

on:
  workflow_dispatch:
  schedule:
    - cron: '40 2 * * *'

jobs:
  verify-scheduling-real-e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
          MYSQL_DATABASE: tiny_web
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    defaults:
      run:
        working-directory: tiny-oauth-server/src/main/webapp

    env:
      E2E_FRONTEND_PORT: 5173
      E2E_BACKEND_PORT: 9000
      E2E_FRONTEND_BASE_URL: http://localhost:5173
      E2E_BACKEND_BASE_URL: http://localhost:9000
      E2E_BACKEND_PROFILE: e2e
      E2E_ENABLE_OIDC_TRACE: false
      E2E_USE_SQL_SEED: false
      E2E_DB_HOST: 127.0.0.1
      E2E_DB_PORT: 3306
      E2E_DB_NAME: tiny_web
      E2E_DB_USER: root
      E2E_DB_USERNAME: root
      E2E_DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      E2E_MYSQL_HOST: 127.0.0.1
      E2E_MYSQL_PORT: 3306
      E2E_MYSQL_DATABASE: tiny_web
      E2E_MYSQL_USER: root
      E2E_MYSQL_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      E2E_OIDC_CLIENT_ID: vue-client
      E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_TOTP_SECRET: ${{ secrets.E2E_TOTP_SECRET }}
      # 优先使用显式平台租户；未单配时回退到主租户 code，避免 CI 因硬编码 platform-e2e 不存在而直接失败。
      E2E_PLATFORM_TENANT_CODE: ${{ secrets.E2E_PLATFORM_TENANT_CODE || secrets.E2E_TENANT_CODE }}
      # 平台身份允许回退到“独立用户名 + 主身份密码/TOTP”，由 ensure-scheduling-e2e-auth.sh 幂等补齐。
      E2E_PLATFORM_USERNAME: ${{ secrets.E2E_PLATFORM_USERNAME || 'e2e_platform_admin' }}
      E2E_PLATFORM_PASSWORD: ${{ secrets.E2E_PLATFORM_PASSWORD || secrets.E2E_PASSWORD }}
      E2E_PLATFORM_TOTP_SECRET: ${{ secrets.E2E_PLATFORM_TOTP_SECRET || secrets.E2E_TOTP_SECRET }}
      E2E_TENANT_CODE_B: ${{ secrets.E2E_TENANT_CODE_B }}
      E2E_USERNAME_B: ${{ secrets.E2E_USERNAME_B }}
      E2E_PASSWORD_B: ${{ secrets.E2E_PASSWORD_B }}
      E2E_TOTP_SECRET_B: ${{ secrets.E2E_TOTP_SECRET_B }}
      E2E_TENANT_CODE_READONLY: ${{ secrets.E2E_TENANT_CODE_READONLY }}
      # readonly 身份允许回退到“独立用户名 + 主身份密码/TOTP”，保持 RBAC 链路真实且避免账号串用。
      E2E_USERNAME_READONLY: ${{ secrets.E2E_USERNAME_READONLY || 'e2e_scheduling_readonly' }}
      E2E_PASSWORD_READONLY: ${{ secrets.E2E_PASSWORD_READONLY || secrets.E2E_PASSWORD }}
      E2E_TOTP_SECRET_READONLY: ${{ secrets.E2E_TOTP_SECRET_READONLY || secrets.E2E_TOTP_SECRET }}
      E2E_TENANT_CODE_BIND: ${{ secrets.E2E_TENANT_CODE_BIND }}
      E2E_USERNAME_BIND: ${{ secrets.E2E_USERNAME_BIND }}
      E2E_PASSWORD_BIND: ${{ secrets.E2E_PASSWORD_BIND }}
      PLAYWRIGHT_HTML_OPEN: never

    steps:
      - uses: actions/checkout@v6

      - name: Write real-link run summary (preflight)
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Scheduling real-link Nightly"
            echo
            echo "- **Workflow**: \`.github/workflows/verify-scheduling-real-e2e.yml\`"
            echo "- **Environment**: \`ubuntu-latest\` + service \`mysql:8.4\` (fresh DB per run)"
            echo "- **Backend**: \`${E2E_BACKEND_BASE_URL}\` (profile=\`${E2E_BACKEND_PROFILE}\`)"
            echo "- **Frontend**: \`${E2E_FRONTEND_BASE_URL}\`"
            echo "- **OIDC client**: \`${E2E_OIDC_CLIENT_ID}\` (silent redirect: \`${E2E_FRONTEND_BASE_URL}/silent-renew.html\`)"
            echo
            echo "### Covered real-link specs"
            echo "- \`e2e/real/platform-vue-login.spec.ts\`"
            echo "- \`e2e/real/active-scope-token-refresh.spec.ts\`"
            echo "- \`e2e/real/scheduling-dag-orchestration.spec.ts\`"
            echo "- \`e2e/real/scheduling-rbac-readonly.spec.ts\`"
            echo "- \`e2e/real/tenant-lifecycle-freeze.spec.ts\`"
            echo
            echo "### Identity & seed notes"
            echo "- **Auth state generation**: Playwright \`globalSetup\` creates storageState via real login (no forged cookie/JWT)."
            echo "- **Tenant-scoped identity**: \`active-scope-token-refresh\` requires a **tenant-scoped** principal;"
            echo "  globalSetup derives \`e2e/.auth/scheduling-tenant-user.json\` (must include \`activeTenantId\` in token + \`GET /sys/users/current\`)."
            echo "- **Seed/auth bootstrap**: \`scripts/e2e/ensure-scheduling-e2e-auth.sh\` runs during globalSetup to ensure deterministic identities/permissions."
            echo
            echo "### Failure triage (first look)"
            echo "- **secrets**: missing secret set => preflight fails fast."
            echo "- **seed/auth**: ensure script errors or login can't proceed."
            echo "- **login/MFA**: redirect loop, stuck on \`/self/security/totp-*\`."
            echo "- **silent renew**: no \`prompt=none\` authorize request or \`login_required\` mismatch."
            echo "- **active scope**: \`POST /sys/users/current/active-scope\` non-200 or missing \`X-Active-Tenant-Id\`."
            echo
            echo "Artifacts are always uploaded: \`playwright-report/\`, \`test-results/\`, backend/frontend logs."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate real-link secret set
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in \
            E2E_DB_PASSWORD \
            E2E_TENANT_CODE \
            E2E_USERNAME \
            E2E_PASSWORD \
            E2E_TOTP_SECRET \
            E2E_PLATFORM_USERNAME \
            E2E_PLATFORM_PASSWORD \
            E2E_PLATFORM_TOTP_SECRET \
            E2E_USERNAME_READONLY \
            E2E_PASSWORD_READONLY \
            E2E_TOTP_SECRET_READONLY
          do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo
              echo "## Preflight blocker: missing real-link E2E secrets"
              echo
              echo "The workflow requires dedicated automation identities and database credentials."
              echo
              echo "Missing:"
              for key in "${missing[@]}"; do
                echo "- \`$key\`"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install webapp dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Prime backend Maven dependencies
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mvn -pl tiny-oauth-server -DskipTests test-compile

      - name: Migrate CI DB to RBAC3 baseline (Liquibase)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mvn -pl tiny-oauth-server \
            -DskipTests \
            liquibase:update

      - name: Verify RBAC3 schema health after migration
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/tiny-platform-scheduling-real-e2e
          chmod +x tiny-oauth-server/scripts/verify-rbac3-schema-health.sh
          tiny-oauth-server/scripts/verify-rbac3-schema-health.sh | tee /tmp/tiny-platform-scheduling-real-e2e/rbac3-schema-health.log
          role_state="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT IF(COUNT(*)>0,'present','missing') FROM information_schema.tables WHERE table_schema='${E2E_DB_NAME}' AND table_name='role';")"
          permission_state="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT IF(COUNT(*)>0,'present','missing') FROM information_schema.tables WHERE table_schema='${E2E_DB_NAME}' AND table_name='permission';")"
          role_permission_state="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT IF(COUNT(*)>0,'present','missing') FROM information_schema.tables WHERE table_schema='${E2E_DB_NAME}' AND table_name='role_permission';")"
          changelog_state="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT IF(COUNT(*)>0,'yes','no') FROM information_schema.tables WHERE table_schema='${E2E_DB_NAME}' AND table_name='DATABASECHANGELOG';")"
          {
            echo
            echo "## RBAC3 schema health (post-migration)"
            echo
            echo "- **DB target**: \`${E2E_DB_HOST}:${E2E_DB_PORT}/${E2E_DB_NAME}\`"
            echo "- **DB user**: \`${E2E_DB_USER}\`"
            echo
            echo "### RBAC3 schema summary"
            echo "- role: ${role_state}"
            echo "- permission: ${permission_state}"
            echo "- role_permission: ${role_permission_state}"
            echo "- changelog recent entries: ${changelog_state}"
            echo "- migration status: passed"
            echo
            echo "### Health output"
            echo "\`\`\`text"
            cat /tmp/tiny-platform-scheduling-real-e2e/rbac3-schema-health.log
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Start backend
        env:
          SPRING_PROFILES_ACTIVE: ${{ env.E2E_BACKEND_PROFILE }}
          E2E_DB_HOST: ${{ env.E2E_DB_HOST }}
          E2E_DB_PORT: ${{ env.E2E_DB_PORT }}
          E2E_DB_NAME: ${{ env.E2E_DB_NAME }}
          E2E_DB_USER: ${{ env.E2E_DB_USER }}
          E2E_DB_PASSWORD: ${{ env.E2E_DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ env.E2E_DB_PASSWORD }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/tiny-platform-scheduling-real-e2e
          mvn -pl tiny-oauth-server spring-boot:run \
            > /tmp/tiny-platform-scheduling-real-e2e/backend.log 2>&1 &
          echo $! > /tmp/tiny-platform-scheduling-real-e2e/backend.pid

          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${E2E_BACKEND_PORT}/login" >/dev/null 2>&1; then
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/tiny-platform-scheduling-real-e2e/backend.pid)" 2>/dev/null; then
              echo "Backend exited before becoming ready."
              tail -n 200 /tmp/tiny-platform-scheduling-real-e2e/backend.log || true
              exit 1
            fi
            sleep 2
          done

          echo "Backend did not become ready in time."
          tail -n 200 /tmp/tiny-platform-scheduling-real-e2e/backend.log || true
          exit 1

      - name: Start frontend
        env:
          VITE_API_BASE_URL: ${{ env.E2E_BACKEND_BASE_URL }}
          VITE_OIDC_AUTHORITY: ${{ env.E2E_BACKEND_BASE_URL }}
          VITE_OIDC_CLIENT_ID: ${{ env.E2E_OIDC_CLIENT_ID }}
          VITE_OIDC_REDIRECT_URI: ${{ env.E2E_FRONTEND_BASE_URL }}/callback
          VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${{ env.E2E_FRONTEND_BASE_URL }}/
          VITE_OIDC_SILENT_REDIRECT_URI: ${{ env.E2E_FRONTEND_BASE_URL }}/silent-renew.html
          VITE_ENABLE_OIDC_TRACE: ${{ env.E2E_ENABLE_OIDC_TRACE }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/tiny-platform-scheduling-real-e2e
          npm run dev -- --host 127.0.0.1 --port "${E2E_FRONTEND_PORT}" \
            > /tmp/tiny-platform-scheduling-real-e2e/frontend.log 2>&1 &
          echo $! > /tmp/tiny-platform-scheduling-real-e2e/frontend.pid

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${E2E_FRONTEND_PORT}/" >/dev/null 2>&1; then
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/tiny-platform-scheduling-real-e2e/frontend.pid)" 2>/dev/null; then
              echo "Frontend exited before becoming ready."
              tail -n 200 /tmp/tiny-platform-scheduling-real-e2e/frontend.log || true
              exit 1
            fi
            sleep 2
          done

          echo "Frontend did not become ready in time."
          tail -n 200 /tmp/tiny-platform-scheduling-real-e2e/frontend.log || true
          exit 1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify authorization schema baseline
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          role_table_count="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = '${E2E_DB_NAME}' AND table_name = 'role';")"
          permission_table_count="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = '${E2E_DB_NAME}' AND table_name = 'permission';")"
          role_permission_table_count="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = '${E2E_DB_NAME}' AND table_name = 'role_permission';")"
          changelog_count="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = '${E2E_DB_NAME}' AND table_name = 'DATABASECHANGELOG';")"
          recent_changelog="$(mysql -h "${E2E_DB_HOST}" -P "${E2E_DB_PORT}" -u "${E2E_DB_USER}" -p"${E2E_DB_PASSWORD}" -N -s -e \
            "SELECT id, author, filename, dateexecuted FROM ${E2E_DB_NAME}.DATABASECHANGELOG ORDER BY dateexecuted DESC LIMIT 5;" 2>/dev/null || true)"
          role_state="missing"
          permission_state="missing"
          role_permission_state="missing"
          if [ "${role_table_count:-0}" -gt 0 ]; then role_state="present"; fi
          if [ "${permission_table_count:-0}" -gt 0 ]; then permission_state="present"; fi
          if [ "${role_permission_table_count:-0}" -gt 0 ]; then role_permission_state="present"; fi
          changelog_state="no"
          if [ "${changelog_count:-0}" -gt 0 ]; then changelog_state="yes"; fi
          migration_status="passed"
          if [ "${role_permission_table_count:-0}" -lt 1 ]; then migration_status="failed"; fi
          {
            echo
            echo "## Authorization schema baseline details"
            echo
            echo "- **DB target**: \`${E2E_DB_HOST}:${E2E_DB_PORT}/${E2E_DB_NAME}\`"
            echo "- **DB user**: \`${E2E_DB_USER}\`"
            echo
            echo "### RBAC3 schema summary"
            echo "- role: ${role_state}"
            echo "- permission: ${permission_state}"
            echo "- role_permission: ${role_permission_state}"
            echo "- changelog recent entries: ${changelog_state}"
            echo "- migration status: ${migration_status}"
            echo
            echo "- **table role**: ${role_table_count:-0}"
            echo "- **table permission**: ${permission_table_count:-0}"
            echo "- **table role_permission**: ${role_permission_table_count:-0}"
            echo "- **DATABASECHANGELOG present**: ${changelog_count:-0}"
            if [ "${changelog_count:-0}" -gt 0 ] && [ -n "${recent_changelog}" ]; then
              echo
              echo "### DATABASECHANGELOG recent rows"
              echo "\`\`\`text"
              echo "${recent_changelog}"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${role_permission_table_count:-0}" -lt 1 ]; then
            {
              echo
              echo "## Preflight blocker: authorization schema baseline not met"
              echo
              echo "Missing required table: \`${E2E_DB_NAME}.role_permission\`."
              echo
              if [ "${changelog_count:-0}" -lt 1 ]; then
                echo "Likely cause: Liquibase did not run on target DB (or DB connection points to wrong schema)."
              elif [ "${role_table_count:-0}" -gt 0 ] || [ "${permission_table_count:-0}" -gt 0 ]; then
                echo "Likely cause: partial migration / inconsistent schema state (possible historical MARK_RAN)."
              else
                echo "Likely cause: target DB is not migrated to RBAC3 baseline."
              fi
              echo
              echo "Nightly real-link no longer supports legacy \`role_resource\` fallback in auth bootstrap."
              echo "Please run database migration to the authorization baseline before rerun."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Run scheduling real-link E2E suite
        env:
          E2E_SKIP_WEBSERVER: 'true'
        run: |
          npm run test:e2e:real -- \
            e2e/real/platform-vue-login.spec.ts \
            e2e/real/active-scope-token-refresh.spec.ts \
            e2e/real/scheduling-dag-orchestration.spec.ts \
            e2e/real/scheduling-rbac-readonly.spec.ts \
            e2e/real/tenant-lifecycle-freeze.spec.ts \
            --reporter=line,html

      - name: Summarize seed & identity signals (post-run)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo
            echo "## Seed & identity signals"
            echo
            echo "- **Expected tenant-scoped auth state**: \`tiny-oauth-server/src/main/webapp/e2e/.auth/scheduling-tenant-user.json\`"
            if [ -f "e2e/.auth/scheduling-tenant-user.json" ]; then
              echo "- **scheduling-tenant-user.json**: present ✅"
            else
              echo "- **scheduling-tenant-user.json**: missing ❌"
            fi
            echo
            echo "### Derived tenant evidence (best effort)"
            if [ -f /tmp/tiny-platform-scheduling-real-e2e/backend.log ]; then
              derived="$(rg -n "Prepared real scheduling e2e auth user: tenant=" /tmp/tiny-platform-scheduling-real-e2e/backend.log | tail -n 5 || true)"
              if [ -n "$derived" ]; then
                echo "\`\`\`text"
                echo "$derived"
                echo "\`\`\`"
              else
                echo "- No 'Prepared real scheduling e2e auth user' lines found in backend.log"
              fi
            else
              echo "- backend.log not found; cannot extract derived tenant lines"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize server logs (tail)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo
            echo "## Server logs (tail)"
            echo
            if [ -f /tmp/tiny-platform-scheduling-real-e2e/backend.log ]; then
              echo "### backend.log (last 120 lines)"
              echo "\`\`\`text"
              tail -n 120 /tmp/tiny-platform-scheduling-real-e2e/backend.log
              echo "\`\`\`"
              echo
            else
              echo "- backend.log not found"
              echo
            fi
            if [ -f /tmp/tiny-platform-scheduling-real-e2e/frontend.log ]; then
              echo "### frontend.log (last 120 lines)"
              echo "\`\`\`text"
              tail -n 120 /tmp/tiny-platform-scheduling-real-e2e/frontend.log
              echo "\`\`\`"
              echo
            else
              echo "- frontend.log not found"
              echo
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize Playwright artifacts (post-run)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo
            echo "## Playwright artifacts"
            echo
            if [ -d test-results ]; then
              traces="$(find test-results -name trace.zip 2>/dev/null | sort | head -n 20 || true)"
              videos="$(find test-results -name '*.webm' 2>/dev/null | sort | head -n 20 || true)"
              screenshots="$(find test-results -name '*.png' 2>/dev/null | sort | head -n 20 || true)"
              error_contexts="$(find test-results -name error-context.md 2>/dev/null | sort | head -n 20 || true)"

              echo "- **Report**: \`tiny-oauth-server/src/main/webapp/playwright-report/\`"
              echo "- **Results**: \`tiny-oauth-server/src/main/webapp/test-results/\`"
              echo
              if [ -n "${error_contexts}" ]; then
                echo "### Error context (top)"
                echo "${error_contexts}" | sed 's/^/- `/' | sed 's/$/`/'
                echo
              fi
              if [ -n "${traces}" ]; then
                echo "### Traces (top)"
                echo "${traces}" | sed 's/^/- `/' | sed 's/$/`/'
                echo
                echo "To inspect locally:"
                echo "\`npx playwright show-trace <path-to-trace.zip>\`"
                echo
              fi
              if [ -n "${videos}" ]; then
                echo "### Videos (top)"
                echo "${videos}" | sed 's/^/- `/' | sed 's/$/`/'
                echo
              fi
              if [ -n "${screenshots}" ]; then
                echo "### Screenshots (top)"
                echo "${screenshots}" | sed 's/^/- `/' | sed 's/$/`/'
                echo
              fi
            else
              echo "- No \`test-results/\` directory found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump server logs on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f /tmp/tiny-platform-scheduling-real-e2e/backend.log ]; then
            echo '== backend.log =='
            tail -n 200 /tmp/tiny-platform-scheduling-real-e2e/backend.log
          fi
          if [ -f /tmp/tiny-platform-scheduling-real-e2e/frontend.log ]; then
            echo '== frontend.log =='
            tail -n 200 /tmp/tiny-platform-scheduling-real-e2e/frontend.log
          fi

      - name: Collect real-link artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p e2e-artifacts
          if [ -f /tmp/tiny-platform-scheduling-real-e2e/backend.log ]; then
            cp /tmp/tiny-platform-scheduling-real-e2e/backend.log e2e-artifacts/backend.log
          fi
          if [ -f /tmp/tiny-platform-scheduling-real-e2e/frontend.log ]; then
            cp /tmp/tiny-platform-scheduling-real-e2e/frontend.log e2e-artifacts/frontend.log
          fi
          if [ -f /tmp/tiny-platform-scheduling-real-e2e/rbac3-schema-health.log ]; then
            cp /tmp/tiny-platform-scheduling-real-e2e/rbac3-schema-health.log e2e-artifacts/rbac3-schema-health.log
          fi

      - name: Upload real-link artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduling-real-e2e-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            tiny-oauth-server/src/main/webapp/playwright-report
            tiny-oauth-server/src/main/webapp/test-results
            tiny-oauth-server/src/main/webapp/e2e-artifacts

      - name: Stop started servers
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          for pid_file in /tmp/tiny-platform-scheduling-real-e2e/frontend.pid /tmp/tiny-platform-scheduling-real-e2e/backend.pid; do
            if [ -f "$pid_file" ]; then
              pid="$(cat "$pid_file")"
              kill "$pid" 2>/dev/null || true
            fi
          done
