name: Validate PR description

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]
    branches: [main]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  validate-pr-description:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest

    steps:
      - name: Load PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumber;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'issue_comment') {
              if (!context.payload.issue.pull_request) {
                core.setFailed('Issue comment is not attached to a pull request.');
                return;
              }
              prNumber = context.payload.issue.number;
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            } else {
              core.setFailed(`Unsupported event: ${context.eventName}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('body', pr.body || '');
            core.setOutput('labels', pr.labels.map((label) => label.name).join(','));
            core.setOutput('author', pr.user.login);
            core.setOutput('base_sha', pr.base.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.base_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate PR body
        env:
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_LABELS: ${{ steps.pr.outputs.labels }}
        run: node .github/scripts/validate-pr-body.mjs

      - name: Validate waiver reviewer approval
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_LABELS: ${{ steps.pr.outputs.labels }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
        run: node .github/scripts/validate-pr-waiver-approval.mjs
